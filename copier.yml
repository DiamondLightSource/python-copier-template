# Project Details
project_name:
  type: str
  help: Name of the project
  default: My Project

description:
    type: str
    help: A short description of your project
    default: "TODO: One line description of your project."

git_platform:
    type: str
    help: Git platform hosting the repository
    choices:
        - github
        - gitlab

github_org:
    type: str
    help: |
        GitHub organization that will contain this repo.
        Set to your GitHub username to make a personal repo, or your organization domain to make an organization repo.
    when: "{{ git_platform == 'github' }}"
    default: adrien-berchet

# Names
repo_name:
    type: str
    help: |
        Name of the repository.
        Generally the package name with spaces replaced by dashes.
    default: "{{ project_name | replace(' ', '-') }}"
    validator: >-
        {% if not (repo_name | regex_search('^[a-zA-Z][a-zA-Z_\\.\\-0-9]+$')) %}
        {{ repo_name }} is not a valid repo name
        {% endif %}

distribution_name:
    type: str
    help: |
        Name of the python distribution package that will be created.
        This is what people will `pip install`.
        Generally the same as the repo name unless there is a name clash on PyPI.
    default: "{{ repo_name }}"

package_name:
    type: str
    help: |
        Name of the python import package.
        Must be a valid python identifier, i.e. my_package
    default: "{{ distribution_name.lower().replace('-', '_').replace(' ', '_') }}"
    validator: >-
        {% if not (package_name | regex_search('^[a-zA-Z][a-zA-Z_0-9]+$')) %}
        {{package_name}} is not a valid python package name
        {% endif %}

# Author Details
author_name:
    type: str
    help: Your full name
    placeholder: FirstName LastName

author_email:
    type: str
    help: Your email address
    placeholder: email@example.com

# Template Options
docker:
    type: bool
    help: |
        Would you like to publish your project in a Docker container?
        You should select this if you are making a service.
    default: false

docker_debug:
    type: bool
    when: "{{ docker }}"
    help: |
        Would you like to publish a debug image of your service?
        This will increase the number of published images, but may
        be useful if debugging the service inside of the cluster
        infrastructure is required.

docs_type:
    type: str
    help: |
        How would you like to document your project?
        You can start with just a README and change your answer to add a sphinx project later.
    choices:
        - sphinx
        - README

type_checker:
    type: str
    help: |
        What type checker would you like to use?
        Pyright is recommended for new projects, but it is stricter,
        so you might need to select mypy for existing projects.
    choices:
        - pyright
        - mypy

strict_typing:
    type: bool
    when: >-
        {{ type_checker == 'pyright' }}
    default: true
    help: |
        Would you like to run pyright in strict mode?
        The recommended approach is to start with strict mode and disable it if it
        becomes too costly to maintain.
        See https://diamondlightsource.github.io/python-copier-template/main/how-to/strict-mode.html
        for more information.

pypi:
    type: bool
    help: Would you like the wheel and source distribution to be automatically uploaded to PyPI when a release is made?

# Internal variables
repo_url:
    type: str
    default: "https://github.com/{{github_org}}/{{repo_name}}"
    when: false

tracker_url:
  type: str
  help: The issue tracker URL
  default: "{{ repo_url }}/issues"
  placeholder: "{{ repo_url }}/issues"

docs_url:
    type: str
    default: "https://{{ distribution_name }}.readthedocs.io"

sphinx:
    type: bool
    default: "{{ docs_type == 'sphinx' }}"
    when: false

copyright_license:
  type: str
  help: The project's license
  default: "MIT License"
  choices:
    Apache License 2.0: null
    BSD 3-Clause "New" or "Revised" License: null
    GNU Affero General Public License v3.0: null
    GNU General Public License v3.0: null
    GNU Lesser General Public License v3.0: null
    MIT License: null
    Mozilla Public License 2.0: null

copyright_year:
  type: str
  help: The year when the repository was created
  default: "{% now 'utc', '%Y' %}"
  when: "{{ copyright_license != 'MIT License' }}"

init_git:
  type: bool
  help: Should git be initialized?
  choices:
    "yes": true
    "no": false
  default: "yes"

ssh_url:
  type: str
  help: The download URL to set the remote of the git repository
  default: "git@github.com:{{ repository_namespace }}/{{ repository_name }}.git"
  placeholder: "git@github.com:{{ repository_namespace }}/{{ repository_name }}.git"
  when: "{{ init_git is true }}"

_subdirectory: "template"

_jinja_extensions:
  - copier_templates_extensions.TemplateExtensionLoader
  - extensions/context.py:ContextUpdater
  - jinja2_time.TimeExtension

_tasks:
    - "{%- if init_git -%}git init; git add --all; git remote add origin {{ ssh_url }}{% else %}{% endif %}"

_exclude:
  - "*.py[co]"
  - ".DS_Store"
  - ".git"
  - ".svn"
  - ".tox"
  - "__pycache__"
  - "copier.yaml"
  - "copier.yml"
  - "~*"

_migrations:
    - version: 2.0.0
      before:
          - echo This update will require you to login to pypi.org and make changes before you can make a new release to PyPI. If you do not have time to do this now, press CTRL+C to abort this update.
      after:
          - echo Visit https://diamondlightsource.github.io/python-copier-template/main/how-to/pypi.html to find out how to set up PyPI trusted publishing
